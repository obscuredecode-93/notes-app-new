<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <!--
      Anti-flash theme script: runs synchronously before the page paints so
      the user never sees a white flash when they have light mode saved.
      Must stay inline (not in a module) to execute before React hydration.
    -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch (_) { /* localStorage unavailable — default to dark, no flash */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
